#textdomain wesnoth-Wild_Frontiers

[test]
    id=wf_hidden_cave_runtime
    name= _ "WF Hidden Cave Runtime"
    turns=1
    is_unit_test=yes
    victory_when_enemies_defeated=no

    map_generation=lua
    [generator]
        id="cavegen"
        config_name="WF Hidden Cave Runtime"
        create_map = << return wesnoth.require("~add-ons/Wild_Frontiers_LWR/lua/cave_map_generator").generate_map(...) >>

        village_density=0

        terrain_wall = "Xu"
        terrain_clear = "Uu"
        terrain_keep = "Kud"
        terrain_castle = "Cud"
        terrain_village = "Uu^Vud"

        map_width=26
        map_height=26

        transform=flip_x,flip_y,flip_xy
        transform_chance=0

        [chamber]
            id=road_east
            x=24
            y=10-14
            size=2
        [/chamber]
        [chamber]
            id=road_west
            x=1
            y=10-14
            size=2
        [/chamber]
        [chamber]
            id=road_south
            x=10-14
            y=24
            size=2
        [/chamber]
        [chamber]
            id=road_north
            x=10-14
            y=1
            size=2
        [/chamber]
        [chamber]
            id=crossroads
            x=10-14
            y=10-14
            size=2
            {PASSAGE_LAZY road_east 1}
            {PASSAGE_LAZY road_west 1}
            {PASSAGE_LAZY road_south 1}
            {PASSAGE_LAZY road_north 1}
        [/chamber]
        [chamber]
            id=mini_01
            x=4-6,4-6
            y=4-6,19-21
            {PLACE_CASTLE 1}
            {PASSAGE_LAZY road_east 1}
            {PASSAGE_LAZY road_west 1}
            {PASSAGE_LAZY road_south 1}
            {PASSAGE_LAZY road_north 1}
            {PASSAGE_LAZY crossroads 2}
        [/chamber]
        [chamber]
            id=mini_02
            x=19-21
            y=19-21
            {PLACE_CASTLE 2}
            {PASSAGE_LAZY crossroads 2}
        [/chamber]
        [chamber]
            id=mini_03
            x=19-21
            y=4-6
            {PLACE_CASTLE 3}
            {PASSAGE_LAZY crossroads 2}
        [/chamber]
    [/generator]

    {UNDERGROUND}

    [side]
        side=1
        controller=human
        team_name=good
        user_team_name= _ "Good"
        [leader]
            id=Hero
            name= _ "Hero"
            type=Sergeant
        [/leader]
    [/side]
    [side]
        side=2
        controller=ai
        team_name=miners
        user_team_name= _ "Miners"
        [leader]
            id=Miner
            name= _ "Miner"
            type=Dwarvish Fighter
        [/leader]
    [/side]

    [event]
        name=start
        [lua]
            code=<<
                local mapgen = wesnoth.require("~add-ons/Wild_Frontiers_LWR/lua/cave_map_generator")
                unit_test.assert(type(mapgen.generate_map) == "function", "cave map generator loaded")
                unit_test.assert(type(wesnoth.wml_actions.save_map) == "function", "utils.lua registered save_map")
                unit_test.assert(type(wesnoth.wml_actions.road_path) == "function", "utils.lua registered road_path")

                local caves = wesnoth.map.find { terrain = "Uu" }
                local keeps = wesnoth.map.find { terrain = "K*^*" }
                local heroes = wesnoth.units.find_on_map { id = "Hero" }

                unit_test.assert_greater(#caves, 0, "generated cave map should contain cave floor")
                unit_test.assert_greater(#keeps, 0, "generated cave map should contain a keep")
                unit_test.assert_equal(#heroes, 1, "hero leader should be placed on the map")
                unit_test.succeed()
            >>
        [/lua]
    [/event]
[/test]
